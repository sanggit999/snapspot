version: '3.8'

services:
  # 1. PostgreSQL Database (+ PostGIS cho Location-based SnapSpot)
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: snapspot_postgres
    restart: always
    environment:
      POSTGRES_DB: snapspot_db
      POSTGRES_USER: snapspot_user
      POSTGRES_PASSWORD: snapspot_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapspot_user -d snapspot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis In-Memory Cache & Message Broker (Bật appendonly yes để lưu dữ liệu xuống ổ đĩa)
  redis:
    image: redis:7-alpine
    container_name: snapspot_redis
    command: redis-server --appendonly yes
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Nginx Reverse Proxy Server
  nginx:
    image: nginx:alpine
    container_name: snapspot_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend

  # 4. Django REST Framework Backend Web Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapspot_backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Celery Worker (Xử lý tác vụ nền bất đồng bộ như nén ảnh, FCM notification)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapspot_celery
    command: celery -A config worker --loglevel=info
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 6. Celery Beat (Lập lịch tác vụ định kỳ nền)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapspot_celery_beat
    command: celery -A config beat --loglevel=info
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

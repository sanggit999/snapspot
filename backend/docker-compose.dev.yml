version: '3.8'

services:
  # 1. PostgreSQL Database Dev Mode
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: snapspot_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: snapspot_db_dev
      POSTGRES_USER: snapspot_user
      POSTGRES_PASSWORD: snapspot_password_dev
    ports:
      - "5432:5432" # Mở port 5432 ra ngoài để dev dùng DBeaver / TablePlus kết nối DB trực tiếp
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapspot_user -d snapspot_db_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis In-Memory Cache Dev Mode (Với appendonly yes)
  redis:
    image: redis:7-alpine
    container_name: snapspot_redis_dev
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - "6379:6379" # Mở port 6379 ra ngoài để dev kết nối Redis Insight
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Backend Django Development Server (Live Reloading khi sửa code local)
  backend:
    build: .
    container_name: snapspot_backend_dev
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    volumes:
      - .:/app # Volume mount mã nguồn local ➔ Tự động reload khi đổi code
    ports:
      - "8000:8000" # Endpoint trực tiếp cho Flutter FE: http://localhost:8000/api/v1/auth/
    environment:
      - DEBUG=True
      - SECRET_KEY=snapspot-dev-secret-key-2026
      - ALLOWED_HOSTS=*
      - USE_POSTGRES=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=snapspot_db_dev
      - DB_USER=snapspot_user
      - DB_PASSWORD=snapspot_password_dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Celery Worker Dev Mode (Live Reload với Volume Mount)
  celery:
    build: .
    container_name: snapspot_celery_dev
    command: celery -A config worker --loglevel=info
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - USE_POSTGRES=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=snapspot_db_dev
      - DB_USER=snapspot_user
      - DB_PASSWORD=snapspot_password_dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:
